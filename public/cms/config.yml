# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: marcusvetter/studio-green
  branch: main

media_folder: /public/media
public_folder: /media

collections:
  - name: sections
    label: Sections
    label_singular: Section
    folder: /content/sections
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Navigation Title, name: nav_title, widget: string, required: false, hint: "Optional shorter title for the navigation bar. Falls back to Title if empty." }
      - { label: Section Identifier, name: section, widget: string, hint: "Machine-readable identifier used as the HTML id (e.g. about-me, services)" }
      - { label: Order, name: order, widget: number, value_type: int, min: 0 }
      - { label: Image, name: image, widget: image, required: false }
      - label: Image Position
        name: image_position
        widget: select
        options: ["left", "right"]
        default: "left"
        required: true
      - { label: Body, name: body, widget: markdown }